<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Exercise 12.2</title>

    <link rel="stylesheet"
          href="css/bootstrap.min.css">

</head>

<body class="bg-dark">

    <div class="container py-5">

        <h1 class="text-center text-warning mb-5">

            Pricing Plans

        </h1>

        <div class="row g-5">

            <!-- Basic Plan -->
            <div class="col-md-4">

                <div class="card shadow-lg
                            text-center p-4 h-100">

                    <h2 class="text-primary">
                        Basic
                    </h2>

                    <h3 class="my-4">
                        ₹499
                    </h3>

                    <p>
                        Basic website features
                    </p>

                    <button class="btn btn-primary mt-3">

                        Choose Plan

                    </button>

                </div>

            </div>

            <!-- Pro Plan -->
            <div class="col-md-4">

                <div class="card shadow-lg
                            text-center p-4 h-100 border-primary">

                    <h2 class="text-success">
                        Pro
                    </h2>

                    <h3 class="my-4">
                        ₹999
                    </h3>

                    <p>
                        Advanced premium features
                    </p>

                    <button class="btn btn-success mt-3">

                        Choose Plan

                    </button>

                </div>

            </div>

            <!-- Premium Plan -->
            <div class="col-md-4">

                <div class="card shadow-lg
                            text-center p-4 h-100">

                    <h2 class="text-danger">
                        Premium
                    </h2>

                    <h3 class="my-4">
                        ₹1499
                    </h3>

                    <p>
                        Full business solution
                    </p>

                    <button class="btn btn-danger mt-3">

                        Choose Plan

                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="js/bootstrap.bundle.min.js"></script>

</body>

</html>
