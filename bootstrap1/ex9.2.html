<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Exercise 9.2</title>

    <link rel="stylesheet"
          href="css/bootstrap.min.css">

</head>

<body class="bg-dark">

    <div class="container mt-5">

        <div class="card shadow-lg p-5">

            <h1 class="text-center text-warning mb-4">
                Button Groups & Toggle Buttons
            </h1>

            <!-- Button Group -->
            <div class="btn-group mb-4 w-100">

                <button class="btn btn-primary">
                    Left
                </button>

                <button class="btn btn-success">
                    Middle
                </button>

                <button class="btn btn-danger">
                    Right
                </button>

            </div>

            <!-- Toggle Buttons -->
            <div class="text-center">

                <input type="checkbox"
                       class="btn-check"
                       id="btncheck1"
                       autocomplete="off">

                <label class="btn btn-outline-primary m-2"
                       for="btncheck1">

                    Toggle 1

                </label>

                <input type="checkbox"
                       class="btn-check"
                       id="btncheck2"
                       autocomplete="off">

                <label class="btn btn-outline-success m-2"
                       for="btncheck2">

                    Toggle 2

                </label>

            </div>

        </div>

    </div>

    <script src="js/bootstrap.bundle.min.js"></script>

</body>

</html>
