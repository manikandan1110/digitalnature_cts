```html
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Exercise 5.2</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="css/bootstrap.min.css">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <!-- Heading -->
        <h1 class="text-center text-primary mb-5">
            Column Reordering
        </h1>

        <!-- Row -->
        <div class="row g-4">

            <!-- First Column -->
            <div class="col-md-6 order-md-2">

                <div class="bg-primary text-white
                            p-5 rounded shadow text-center">

                    <h2>
                        First Column
                    </h2>

                    <p>
                        This column appears second
                        on medium screens and above.
                    </p>

                </div>

            </div>

            <!-- Second Column -->
            <div class="col-md-6 order-md-1">

                <div class="bg-success text-white
                            p-5 rounded shadow text-center">

                    <h2>
                        Second Column
                    </h2>

                    <p>
                        This column appears first
                        on medium screens and above.
                    </p>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="js/bootstrap.bundle.min.js"></script>

</body>

</html>
