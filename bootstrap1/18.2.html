<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Exercise 18.2</title>

    <link rel="stylesheet"
          href="css/bootstrap.min.css">

</head>

<body class="bg-secondary">

    <div class="container py-5">

        <h1 class="text-center text-white mb-5">

            Bootstrap Accordion

        </h1>

        <!-- Accordion -->
        <div class="accordion shadow-lg"
             id="accordionExample">

            <!-- Item 1 -->
            <div class="accordion-item">

                <h2 class="accordion-header">

                    <button class="accordion-button"
                            type="button"
                            data-bs-toggle="collapse"
                            data-bs-target="#collapseOne">

                        What is Bootstrap?

                    </button>

                </h2>

                <div id="collapseOne"
                     class="accordion-collapse collapse show"
                     data-bs-parent="#accordionExample">

                    <div class="accordion-body">

                        Bootstrap is a popular CSS framework
                        used for responsive web development.

                    </div>

                </div>

            </div>

            <!-- Item 2 -->
            <div class="accordion-item">

                <h2 class="accordion-header">

                    <button class="accordion-button collapsed"
                            type="button"
                            data-bs-toggle="collapse"
                            data-bs-target="#collapseTwo">

                        Why use Bootstrap?

                    </button>

                </h2>

                <div id="collapseTwo"
                     class="accordion-collapse collapse"
                     data-bs-parent="#accordionExample">

                    <div class="accordion-body">

                        Bootstrap provides responsive layouts,
                        components and utilities quickly.

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="js/bootstrap.bundle.min.js"></script>

</body>

</html>
