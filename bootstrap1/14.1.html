<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Exercise 14.1</title>

    <link rel="stylesheet"
          href="css/bootstrap.min.css">

</head>

<body class="bg-light">

    <div class="container py-5">

        <h1 class="text-center text-primary mb-5">

            Display & Visibility Utilities

        </h1>

        <!-- Hidden on Small Screens -->
        <div class="bg-danger text-white
                    p-4 rounded shadow
                    d-none d-md-block mb-4">

            Visible only on Medium Screens and Above

        </div>

        <!-- Flex only on Large Screens -->
        <div class="bg-success text-white
                    p-4 rounded shadow
                    d-none d-lg-flex
                    justify-content-center">

            Visible as Flex on Large Screens

        </div>

    </div>

    <script src="js/bootstrap.bundle.min.js"></script>

</body>

</html>
