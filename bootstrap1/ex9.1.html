<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Exercise 9.1</title>

    <link rel="stylesheet"
          href="css/bootstrap.min.css">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow-lg p-5 text-center">

            <h1 class="text-primary mb-4">
                Bootstrap Buttons
            </h1>

            <!-- Contextual Buttons -->
            <button class="btn btn-primary m-2">
                Primary
            </button>

            <button class="btn btn-secondary m-2">
                Secondary
            </button>

            <button class="btn btn-success m-2">
                Success
            </button>

            <button class="btn btn-danger m-2">
                Danger
            </button>

            <button class="btn btn-warning m-2">
                Warning
            </button>

            <button class="btn btn-info m-2">
                Info
            </button>

            <button class="btn btn-dark m-2">
                Dark
            </button>

            <hr class="my-4">

            <!-- Outline Buttons -->
            <button class="btn btn-outline-primary m-2">
                Outline Primary
            </button>

            <button class="btn btn-outline-success m-2">
                Outline Success
            </button>

            <button class="btn btn-outline-danger m-2">
                Outline Danger
            </button>

        </div>

    </div>

    <script src="js/bootstrap.bundle.min.js"></script>

</body>

</html>
