<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Exercise 4.1</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="row">

            <!-- Sidebar -->
            <div class="col-md-3">

                <div class="bg-dark text-white p-4 rounded shadow">

                    <h3 class="text-warning mb-4">
                        Dashboard
                    </h3>

                    <ul class="list-group">

                        <li class="list-group-item">
                            Home
                        </li>

                        <li class="list-group-item">
                            Profile
                        </li>

                        <li class="list-group-item">
                            Settings
                        </li>

                        <li class="list-group-item">
                            Logout
                        </li>

                    </ul>

                </div>

            </div>

            <!-- Content Area -->
            <div class="col-md-9">

                <div class="bg-white p-5 rounded shadow">

                    <h1 class="text-primary">
                        Welcome User
                    </h1>

                    <p class="lead">
                        This is the main content section designed using
                        Bootstrap Grid System.
                    </p>

                    <p>
                        The sidebar occupies 3 columns and the content area
                        occupies 9 columns in medium and larger screens.
                    </p>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="js/bootstrap.bundle.min.js"></script>

</body>

</html>
