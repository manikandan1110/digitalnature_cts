<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Exercise 4.2</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>

<body class="bg-dark">

    <div class="container mt-5">

        <h1 class="text-center text-warning mb-5">
            Four Column Layout
        </h1>

        <div class="row g-4 text-center">

            <!-- Column 1 -->
            <div class="col-sm-3">

                <div class="bg-primary text-white p-5 rounded shadow">

                    <h3>HTML</h3>

                </div>

            </div>

            <!-- Column 2 -->
            <div class="col-sm-3">

                <div class="bg-success text-white p-5 rounded shadow">

                    <h3>CSS</h3>

                </div>

            </div>

            <!-- Column 3 -->
            <div class="col-sm-3">

                <div class="bg-danger text-white p-5 rounded shadow">

                    <h3>JavaScript</h3>

                </div>

            </div>

            <!-- Column 4 -->
            <div class="col-sm-3">

                <div class="bg-warning text-dark p-5 rounded shadow">

                    <h3>Bootstrap</h3>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="js/bootstrap.bundle.min.js"></script>

</body>

</html>
