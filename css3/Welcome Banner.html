<!DOCTYPE html>
<html>
<head>
    <title>Welcome Banner</title>
    <style>
        #welcome {
            background-color: blue;
            color: white;
            padding: 10px;
            text-align: center;
        }
        .highlight {
            background-color: yellow;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="welcome">
        <h1>Welcome, User!</h1>
    </div>
    <p>
        Thank you for logging in.
        <span class="highlight">Enjoy your visit!</span>
    </p>
    <p>
        <span style="color:red; font-weight:bold;">
            Special Offer: Get 50% Discount Today!
        </span>
    </p>
    <p class="highlight">
        Hurry! Offer ends soon.
    </p>
</body>
</html>
