<!DOCTYPE html>
<html>
<head>
    <title>Community Events Gallery</title>
    <style>
        .event-image {
            border: 2px solid black;
            width: 150px;
            height: 100px;
        }

        table {
            border-collapse: collapse;
        }

        td {
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h2>Community Events Gallery</h2>
    <table border="1">
        <tr>
            <td>
                <img src="event1.jpg" alt="Sports Day"
                     title="Sports Day Event"
                     class="event-image">
                <p>Sports Day</p>
            </td>
            <td>
                <img src="event2.jpg" alt="Cultural Fest"
                     title="Cultural Fest Event"
                     class="event-image">
                <p>Cultural Fest</p>
            </td>
            <td>
                <img src="event3.jpg" alt="Tree Plantation"
                     title="Tree Plantation Event"
                     class="event-image">
                <p>Tree Plantation Drive</p>
            </td>
        </tr>
        <tr>
            <td>
                <img src="event4.jpg" alt="Science Exhibition"
                     title="Science Exhibition"
                     class="event-image">
                <p>Science Exhibition</p>
            </td>
            <td>
                <img src="event5.jpg" alt="Blood Donation Camp"
                     title="Blood Donation Camp"
                     class="event-image">
                <p>Blood Donation Camp</p>
            </td>
            <td>
                <img src="event6.jpg" alt="Awareness Program"
                     title="Awareness Program"
                     class="event-image">
                <p>Awareness Program</p>
            </td>
        </tr>
    </table>
</body>
</html>
