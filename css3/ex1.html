<!DOCTYPE html>
<html>
<head>
    <title>CSS Inclusion Methods</title>
    <!-- Internal CSS -->
    <style>
        body {
            background-color: lightgray;
        }
    </style>
    <!-- External CSS -->
    <link rel="stylesheet" href="ex1.css">
</head>
<body>
    <!-- Inline CSS -->
    <h1 style="color:red;">
        Welcome to Community Event Portal
    </h1>
    <h2 class="header">
        Upcoming Events
    </h2>
    <p class="content">
        Stay updated with all community activities and events.
    </p>
</body>
</html>
